apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: deployment
  namespace: argocd
spec:
  project: default
  destination:
    namespace: dev
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/NicolasMetais/IOT-argoCD-nmetais.git
    targetRevision: HEAD
    path: .
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    
